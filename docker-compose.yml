services:
  wa-bot:
    build:
      context: ./wa-bot
    container_name: wa-bot
    restart: always
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      # 挂载配置文件目录（Dockerfile 中已创建 /config -> /app/config 符号链接）
      - ./config:/app/config
      - ./data:/opt/automation-ocr/data
      # 持久化 WhatsApp 登录凭据，防止重启后重新扫码
      - ./data/wwebjs_auth:/opt/automation-ocr/wa-bot/.wwebjs_auth
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
