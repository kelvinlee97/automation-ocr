<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Dashboard</title>
    <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
    <!-- 状态栏 -->
    <header id="statusBar">
        <div class="status-left">
            <h1>OCR Dashboard</h1>
            <button id="toggleBotPanelBtn" class="btn-small">📱 Bot 状态</button>
        </div>
        <div class="status-right">
            <span class="status-item">
                <span class="dot" id="ocrDot"></span>
                OCR <span id="ocrStatus">--</span>
            </span>
            <span class="status-item">
                已处理 <strong id="processedCount">--</strong>
            </span>
            <span class="status-item">
                <span class="dot" id="wsDot"></span>
                WS <span id="wsStatus">断开</span>
            </span>
        </div>
    </header>

    
    <!-- Bot 状态面板 (QR码等) -->
    <div id="botPanel" class="bot-panel hidden">
        <h3>WhatsApp Bot 状态</h3>
        <p id="botMessage">正在连接...</p>
        <div id="botQrContainer" class="hidden">
            <img id="botQrImage" alt="扫码登录" />
        </div>
    </div>

    <!-- 筛选栏 -->
    <div id="toolbar">
        <input type="text" id="phoneSearch" placeholder="手机号搜索..." />
        <button id="refreshBtn" title="刷新">刷新</button>
    </div>

    <!-- 记录表格 -->
    <div id="tableContainer">
        <table id="receiptsTable">
            <thead>
                <tr>
                    <th>时间</th>
                    <th>手机号</th>
                    <th>品牌</th>
                    <th>金额</th>
                    <th>合格</th>
                    <th>置信度</th>
                    <th>耗时</th>
                </tr>
            </thead>
            <tbody id="receiptsBody">
                <tr class="empty-row"><td colspan="7">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <div id="pagination">
        <button id="prevBtn" disabled>上一页</button>
        <span id="pageInfo">--</span>
        <button id="nextBtn" disabled>下一页</button>
    </div>

    <!-- 详情面板（点击行后展开） -->
    <div id="detailPanel" class="hidden">
        <div id="detailHeader">
            <h2>处理详情</h2>
            <button id="closeDetail">关闭</button>
        </div>
        <div id="detailContent">
            <!-- 步骤 Timeline -->
            <div id="stepsTimeline">
                <div class="timeline-header">
                    <span>处理流水线</span>
                    <span id="totalDuration">--</span>
                </div>
                <div id="stepsContainer"></div>
            </div>
            
            <!-- 审核/编辑表单 -->
            <div id="reviewSection">
                <h3>人工审核 / 修正</h3>
                <form id="reviewForm">
                    <input type="hidden" id="editRecordId" />
                    <div class="form-row">
                        <div class="form-group">
                            <label>单据号：</label>
                            <input type="text" id="editReceiptNo" />
                        </div>
                        <div class="form-group">
                            <label>匹配品牌：</label>
                            <input type="text" id="editBrand" />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>消费金额 (RM)：</label>
                            <input type="number" step="0.01" id="editAmount" />
                        </div>
                        <div class="form-group">
                            <label>是否合格：</label>
                            <select id="editQualified">
                                <option value="true">是 (YES)</option>
                                <option value="false">否 (NO)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="reasonGroup">
                        <label>不合格原因：</label>
                        <input type="text" id="editReason" placeholder="如合格则留空" />
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="saveReviewBtn">保存审核结果</button>
                        <span id="saveStatus"></span>
                    </div>
                </form>
            </div>

            <!-- 原始文本 + 图片 -->
            <div id="detailExtra">
                <div id="rawTextSection">
                    <h3>原始 OCR 文本</h3>
                    <pre id="rawTextContent"></pre>
                </div>
                <div id="imageSection">
                    <h3>收据图片</h3>
                    <img id="receiptImage" alt="收据图片" />
                </div>
            </div>
        </div>
    </div>

    <script src="/dashboard/static/app.js"></script>
</body>
</html>
