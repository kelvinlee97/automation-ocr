# automation-ocr Nginx 反代配置
# 使用方式（手动部署）：
#   sudo cp infra/nginx/automation-ocr.conf /etc/nginx/sites-available/automation-ocr
#   sudo ln -s /etc/nginx/sites-available/automation-ocr /etc/nginx/sites-enabled/automation-ocr
#   sudo nginx -t && sudo systemctl reload nginx
#
# 申请证书（域名 DNS 已解析到本机后执行）：
#   sudo bash infra/nginx/setup-https.sh yourdomain.com your@email.com
#   Certbot --nginx 会就地修改本文件：在 HTTP 块插入 301 重定向，并在末尾新增 HTTPS server 块

# ── WebSocket 升级头映射 ──────────────────────────────────────────────────────
# 仅在客户端发起 WS 握手（有 Upgrade 头）时设为 upgrade，否则设为 close
# 避免所有 HTTP 请求都带 Connection: upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP（80）───────────────────────────────────────────────────────────────
# ⚠️ 必须将 server_name 替换为实际域名，否则 Certbot 无法匹配此 server 块
# 运行 setup-https.sh 会自动替换，手动部署时需人工修改
server {
    listen 80;
    listen [::]:80;

    server_name example.com;  # TODO: 替换为实际域名，例如 example.com www.example.com

    # 隐藏 Nginx 版本号，减少攻击面（默认会在错误页和响应头暴露版本）
    server_tokens off;

    # 注意：使用 --nginx 插件时此块由 Certbot 自动管理，续期不依赖此目录。
    # 仅在使用 --webroot 或 Docker Certbot 容器方案时才需要手动挂载此路径。
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 反代到 Docker 容器（Node.js 监听 127.0.0.1:3000）
    location / {
        proxy_pass http://127.0.0.1:3000;

        # 传递真实客户端 IP——Node.js 的 rate-limit 和日志依赖这两个 Header
        # 需配合 app.set("trust proxy", 1) 才能使 req.ip 正确取到真实 IP
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 保留原始 Host，避免 express-session cookie domain 错误
        proxy_set_header Host $host;

        # WebSocket 支持（管理后台 SSE / 未来 WS 功能所需）
        # 注：whatsapp-web.js 的 WS 是服务端出站连接，不经过此 Nginx 代理
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 超时：Gemini 识别收据约需 5-10s，留足余量
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # 管理后台 HTTP 上传大小上限（当前 WhatsApp 图片经 whatsapp-web.js 内部通道，不受此限制）
        client_max_body_size 20m;

        # 安全响应头
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    }
}

# ── HTTPS（443）─────────────────────────────────────────────────────────────
# 此块由 Certbot 自动生成，运行 setup-https.sh 后写入。
# Certbot --nginx 会：
#   1. 在上方 HTTP server 块中插入 return 301 https://$host$request_uri
#   2. 在本文件末尾新增完整的 SSL server 块（含证书路径和 TLS 参数）
# 建议运行前备份本文件：cp automation-ocr.conf automation-ocr.conf.bak
#
# 证书申请成功后 Certbot 配置的内容示例：
#   ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem
#   ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem
#   include             /etc/letsencrypt/options-ssl-nginx.conf
#   ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem
#
# HSTS（证书稳定后再启用，避免证书异常时浏览器无法访问）：
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
