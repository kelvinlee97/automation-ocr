name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个部署任务运行，避免并发冲突
# cancel-in-progress: false 确保正在进行的部署不会被新的 push 中断
concurrency:
  group: deploy-production
  cancel-in-progress: false

# 部署区域：所有 AWS CLI 命令统一使用此变量，避免 Secret 配置错误导致区域不匹配
env:
  AWS_DEPLOY_REGION: ap-southeast-1

jobs:
  # Job 1：在 GitHub 托管 runner 上构建镜像并推送至 GHCR
  # 构建与服务器完全隔离，不占用 EC2 内存
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # 写入 GitHub Packages (GHCR) 需要此权限
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN 是内置 token，无需在 Secrets 中手动配置
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 初始化 Buildx
        # 使用内置 docker driver，避免从 Docker Hub 拉取 buildkit 镜像触发限流
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: ./wa-bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # Job 2：通过 SSM SendCommand 在 EC2 上执行部署
  # 走 AWS API（HTTPS 443），无需开放 22 端口，无需 SSH Key
  # OIDC：GitHub Runner 获取临时凭证调用 AWS API，无需存储任何长期 Access Key
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    permissions:
      id-token: write   # 允许 GitHub 颁发 OIDC token，用于 AssumeRoleWithWebIdentity
      contents: read

    steps:
      - name: 配置 AWS 凭证（OIDC）
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          # 区域硬编码在 env.AWS_DEPLOY_REGION，不依赖 Secret 值是否正确
          aws-region: ${{ env.AWS_DEPLOY_REGION }}

      - name: 从 CloudFormation 获取实例 ID
        id: cfn
        run: |
          # 动态读取实例 ID，避免硬编码（重建 Stack 后 ID 会变）
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name automation-ocr \
            --region "$AWS_DEPLOY_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='Ec2InstanceId'].OutputValue" \
            --output text)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "实例 ID: ${INSTANCE_ID}"

      - name: SSM 部署
        env:
          INSTANCE_ID: ${{ steps.cfn.outputs.instance_id }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        run: |
          # 通过 SSM 在实例上执行部署脚本
          # SSM 以最小环境的 root 运行，需显式设 HOME 和 safe.directory
          # GEMINI_API_KEY 和 SESSION_SECRET 均由 EC2 自身从 Parameter Store 取得（SecureString），不经过 Runner
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --region "$AWS_DEPLOY_REGION" \
            --parameters "$(jq -n \
              --arg ghcr_token "${GHCR_TOKEN}" \
              --arg ghcr_actor "${GHCR_ACTOR}" \
              --arg region "${AWS_DEPLOY_REGION}" \
              '{commands: [
                "set -e",
                "# SSM 以 root 运行，仅取密钥时使用 root（需要 IAM 权限），其余操作切换到 ubuntu 执行",
                ("GEMINI_KEY=$(aws ssm get-parameter --name /automation-ocr/gemini-api-key --with-decryption --query Parameter.Value --output text --region " + $region + ")"),
                ("SESSION_SECRET=$(aws ssm get-parameter --name /automation-ocr/session-secret --with-decryption --query Parameter.Value --output text --region " + $region + ")"),
                "# 写入 .env：以 ubuntu 用户写入，确保文件归属正确",
                "printf 'GEMINI_API_KEY=%s\\nSESSION_SECRET=%s\\n' \"${GEMINI_KEY}\" \"${SESSION_SECRET}\" | sudo -u ubuntu tee /home/ubuntu/automation-ocr/.env > /dev/null",
                "# git pull：以 ubuntu 用户执行，拉取的文件归属 ubuntu",
                "sudo -u ubuntu git -C /home/ubuntu/automation-ocr pull origin main",
                "# docker 操作：ubuntu 已在 docker 组，无需 root",
                ("echo \"" + $ghcr_token + "\" | sudo -u ubuntu docker login ghcr.io -u \"" + $ghcr_actor + "\" --password-stdin"),
                "sudo -u ubuntu docker compose -f /home/ubuntu/automation-ocr/docker-compose.yml pull",
                "sudo -u ubuntu docker compose -f /home/ubuntu/automation-ocr/docker-compose.yml up -d --remove-orphans",
                "sudo -u ubuntu docker image prune -f",
                "docker ps --filter name=wa-bot --format \"table {{.Names}}\\t{{.Status}}\\t{{.Ports}}\""
              ]}')" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          # 轮询等待执行完成（每 10 秒一次，最多 8 分钟）
          for i in $(seq 1 48); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --region "$AWS_DEPLOY_REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$((i * 10))s] 状态: ${STATUS}"

            if [ "${STATUS}" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region "$AWS_DEPLOY_REGION" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region "$AWS_DEPLOY_REGION" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

          echo "超时：命令未在 8 分钟内完成"
          exit 1
