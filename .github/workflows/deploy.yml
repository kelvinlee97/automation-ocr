name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个部署任务运行，避免并发冲突
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # 直接在 EC2 服务器上运行，无需 SSM 中间层
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: 拉取最新代码
        run: |
          cd /home/ubuntu/automation-ocr
          git pull origin main

      - name: 写入环境变量
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          printf 'GEMINI_API_KEY=%s\nADMIN_USER=%s\nADMIN_PASS=%s\n' \
            "$GEMINI_API_KEY" "$ADMIN_USER" "$ADMIN_PASS" \
            > /home/ubuntu/automation-ocr/.env

      - name: 重新构建并启动容器
        run: |
          cd /home/ubuntu/automation-ocr
          docker compose down
          docker compose up -d --build --remove-orphans
          docker image prune -f

      - name: 确认容器状态
        run: |
          docker ps --filter 'name=wa-bot' --format 'table {{.Names}}\t{{.Status}}'
