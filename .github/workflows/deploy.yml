name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个部署任务运行，避免并发冲突
# cancel-in-progress: false 确保正在进行的部署不会被新的 push 中断
concurrency:
  group: deploy-production
  cancel-in-progress: false

# 部署区域：所有 AWS CLI 命令统一使用此变量，避免 Secret 配置错误导致区域不匹配
env:
  AWS_DEPLOY_REGION: ap-southeast-1

jobs:
  # Job 1：在 GitHub 托管 runner 上构建镜像并推送至 GHCR
  # 构建与服务器完全隔离，不占用 EC2 内存
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # 写入 GitHub Packages (GHCR) 需要此权限
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN 是内置 token，无需在 Secrets 中手动配置
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 初始化 Buildx（docker-container driver 才支持 GHA cache 和直接推送）
        uses: docker/setup-buildx-action@v3

      - name: 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: ./wa-bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # 利用 GitHub Actions 缓存加速重复构建
          # 依赖层（npm install）未变时直接复用，构建时间从分钟级降到秒级
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2：通过 SSM SendCommand 在 EC2 上执行部署
  # 走 AWS API（HTTPS 443），无需开放 22 端口，无需 SSH Key
  # OIDC：GitHub Runner 获取临时凭证调用 AWS API，无需存储任何长期 Access Key
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    permissions:
      id-token: write   # 允许 GitHub 颁发 OIDC token，用于 AssumeRoleWithWebIdentity
      contents: read

    steps:
      - name: 配置 AWS 凭证（OIDC）
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          # 区域硬编码在 env.AWS_DEPLOY_REGION，不依赖 Secret 值是否正确
          aws-region: ${{ env.AWS_DEPLOY_REGION }}

      - name: 从 CloudFormation 获取实例 ID
        id: cfn
        run: |
          # 动态读取实例 ID，避免硬编码（重建 Stack 后 ID 会变）
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name automation-ocr \
            --region "$AWS_DEPLOY_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='Ec2InstanceId'].OutputValue" \
            --output text)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "实例 ID: ${INSTANCE_ID}"

      - name: SSM 部署
        env:
          INSTANCE_ID: ${{ steps.cfn.outputs.instance_id }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        run: |
          # 通过 SSM 在实例上执行部署脚本
          # SSM 以 root 运行，git safe.directory 避免 dubious ownership 报错
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --region "$AWS_DEPLOY_REGION" \
            --parameters "$(jq -n \
              --arg gemini_key "${GEMINI_API_KEY}" \
              --arg ghcr_token "${GHCR_TOKEN}" \
              --arg ghcr_actor "${GHCR_ACTOR}" \
              '{commands: [
                "set -e",
                "git config --global --add safe.directory /home/ubuntu/automation-ocr",
                "cd /home/ubuntu/automation-ocr",
                "git pull origin main",
                ("printf \"GEMINI_API_KEY=%s\\n\" \"" + $gemini_key + "\" > .env"),
                ("echo \"" + $ghcr_token + "\" | docker login ghcr.io -u \"" + $ghcr_actor + "\" --password-stdin"),
                "docker compose pull",
                "docker compose up -d --remove-orphans",
                "docker image prune -f",
                "docker ps --filter name=wa-bot --format \"table {{.Names}}\\t{{.Status}}\\t{{.Ports}}\""
              ]}')" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          # 轮询等待执行完成（每 10 秒一次，最多 8 分钟）
          for i in $(seq 1 48); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --region "$AWS_DEPLOY_REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$((i * 10))s] 状态: ${STATUS}"

            if [ "${STATUS}" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region "$AWS_DEPLOY_REGION" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region "$AWS_DEPLOY_REGION" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

          echo "超时：命令未在 8 分钟内完成"
          exit 1
