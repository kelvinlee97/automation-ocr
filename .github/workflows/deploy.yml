name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个部署任务运行，避免并发冲突
# cancel-in-progress: false 确保正在进行的部署不会被新的 push 中断
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Job 1：在 GitHub 托管 runner 上构建镜像并推送至 GHCR
  # 构建与服务器完全隔离，不占用 EC2 内存
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # 写入 GitHub Packages (GHCR) 需要此权限
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN 是内置 token，无需在 Secrets 中手动配置
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 初始化 Buildx（docker-container driver 才支持 GHA cache 和直接推送）
        uses: docker/setup-buildx-action@v3

      - name: 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: ./wa-bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # 利用 GitHub Actions 缓存加速重复构建
          # 依赖层（npm install）未变时直接复用，构建时间从分钟级降到秒级
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2：SSH 到 EC2，拉取新镜像并重启服务
  # 需要等 Job 1 完成，确保镜像已推送到 GHCR
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: 获取 runner 出口 IP
        id: get_ip
        run: |
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          echo "Runner IP: ${RUNNER_IP}"

      - name: 临时开放安全组 22 端口（仅 runner IP /32）
        id: open_sg
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          # 通过实例公网 IP 反查安全组 ID，无需单独维护 Secret
          SG_ID=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=${{ secrets.EC2_HOST }}" \
            --query "Reservations[0].Instances[0].SecurityGroups[0].GroupId" \
            --output text)
          echo "sg_id=${SG_ID}" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "${SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${{ steps.get_ip.outputs.runner_ip }}/32"

      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          script: |
            cd /home/ubuntu/automation-ocr
            git pull origin main

            # 写入环境变量文件（覆盖旧文件，确保 secrets 最新）
            # ADMIN_USER/ADMIN_PASS 已迁移到管理后台内置用户管理，不再通过环境变量注入
            printf 'GEMINI_API_KEY=%s\n' \
              '${{ secrets.GEMINI_API_KEY }}' \
              > .env

            # 登录 GHCR 以拉取镜像（公开仓库的包也需要登录才能拉取）
            echo '${{ secrets.GITHUB_TOKEN }}' | \
              docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            # 清理旧镜像，防止磁盘空间被历史层占满
            docker image prune -f

      - name: 确认容器状态
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker ps --filter 'name=wa-bot' \
              --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

      - name: 撤销安全组临时规则（无论部署成功或失败都执行）
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ steps.open_sg.outputs.sg_id }}" \
            --protocol tcp --port 22 \
            --cidr "${{ steps.get_ip.outputs.runner_ip }}/32"
