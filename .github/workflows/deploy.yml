name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个部署任务运行，避免并发冲突
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: SSH 部署到 EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 超时设置：单条命令最长 8 分钟（docker build 可能较慢）
          command_timeout: 8m
          envs: GEMINI_API_KEY,ADMIN_USER,ADMIN_PASS
          script: |
            set -e

            cd /home/ubuntu/automation-ocr

            # 将 token 嵌入 HTTPS remote URL，非交互式环境下免登录
            git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/kelvinlee97/automation-ocr.git

            echo ">>> 拉取最新代码..."
            git pull origin main

            echo ">>> 重新构建并启动容器..."
            # ubuntu 已加入 docker 组，无需 sudo，环境变量直接继承
            docker compose down
            docker compose up -d --build --remove-orphans

            echo ">>> 清理旧镜像，释放磁盘空间..."
            docker image prune -f

            echo ">>> 确认容器运行状态..."
            docker ps --filter "name=wa-bot" --format "table {{.Names}}\t{{.Status}}"
