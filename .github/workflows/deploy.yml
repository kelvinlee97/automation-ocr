name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个部署任务运行，避免并发冲突
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: SSH 部署到 Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          # 超时设置：单条命令最长 8 分钟（docker build 可能较慢）
          command_timeout: 8m
          script: |
            set -e

            # 修复 Git 安全目录检查（目录 owner 与 SSH 用户不一致时会报 dubious ownership）
            git config --global --add safe.directory /home/ubuntu/automation-ocr

            cd /home/ubuntu/automation-ocr

            echo ">>> 拉取最新代码..."
            git pull origin main

            echo ">>> 重新构建并启动容器..."
            docker compose up -d --build

            echo ">>> 清理旧镜像，释放磁盘空间..."
            docker image prune -f

            echo ">>> 确认容器运行状态..."
            docker ps --filter "name=wa-bot" --format "table {{.Names}}\t{{.Status}}"
