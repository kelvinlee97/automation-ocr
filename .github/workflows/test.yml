name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wa-bot/package-lock.json

      - name: Install dependencies
        working-directory: wa-bot
        run: npm ci

      - name: Run linter
        working-directory: wa-bot
        run: npm run lint

      - name: Run tests
        working-directory: wa-bot
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: wa-bot/coverage
          fail_ci_if_error: false