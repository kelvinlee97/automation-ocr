AWSTemplateFormatVersion: "2010-09-09"
Description: >
  WhatsApp OCR Bot — 单机 EC2 部署
  包含：VPC、Security Group、EC2 实例（Docker + docker-compose 自动部署）、
  EBS 数据卷（持久化 Excel/上传图片）、SSM 访问权限（无需开放 SSH）。

# ────────────────────────────────────────────────────────────
# 参数：部署前在 Console 或 CLI 填写
# ────────────────────────────────────────────────────────────
Parameters:
  GitRepoUrl:
    Type: String
    Description: "项目 GitHub 仓库地址，格式：https://github.com/<用户>/<仓库>.git"

  GitBranch:
    Type: String
    Default: main
    Description: "要部署的分支"

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.medium   # 2 vCPU / 4GB — 最低可用（EasyOCR 模型加载峰值约 2.5GB）
      - t3.large    # 2 vCPU / 8GB — 推荐，模型运行更稳定
      - t3.xlarge   # 4 vCPU / 16GB — 高并发场景
    Description: "EC2 实例类型（EasyOCR 对内存要求高，推荐 t3.large）"

  AdminIp:
    Type: String
    Default: "0.0.0.0/0"
    Description: "允许远程登入（SSH/Dashboard）的本机 IP 网段（例如 1.2.3.4/32）"

  KeyName:
    Type: String
    Default: ""
    Description: "EC2 密钥对名称（可选，用于 SSH 登录；为空则仅可通过 SSM 登录）"


  DataVolumeSize:
    Type: Number
    Default: 20
    MinValue: 10
    MaxValue: 100
    Description: "数据 EBS 卷大小（GB），存储 Excel 数据和收据图片"

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: "Amazon Linux 2023 最新 AMI（自动获取，通常无需修改）"

  GitHubTokenSecretName:
    Type: String
    Default: ""
    Description: "AWS Secrets Manager 中存储 GitHub PAT 的 Secret 名称（私有仓库必填，公开仓库留空）"

# ────────────────────────────────────────────────────────────
# 条件
# ────────────────────────────────────────────────────────────
Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

  HasGitHubToken: !Not [!Equals [!Ref GitHubTokenSecretName, ""]]

# ────────────────────────────────────────────────────────────
# 资源定义
# ────────────────────────────────────────────────────────────
Resources:

  # ── VPC ──────────────────────────────────────────────────
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-subnet"

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-rtb"

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # ── Security Group ────────────────────────────────────────
  # 不开放 SSH（22 端口），通过 SSM Session Manager 管理实例
  # WhatsApp Bot 不对外暴露端口，只需出站访问
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "WhatsApp OCR Bot - outbound only, allow inbound SSH/Dashboard from Admin IP"
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminIp
          Description: "Allow SSH from Admin IP"
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: !Ref AdminIp
          Description: "Allow OCR Dashboard from Admin IP"
      SecurityGroupEgress:
        - IpProtocol: -1         # 允许所有出站（访问 WhatsApp、GitHub、PyPI 等）
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # ── IAM Role（SSM 访问 + CloudWatch Logs）─────────────────
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager：无需 SSH key 即可远程登录管理
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        # CloudWatch Agent：将容器日志推送到 CloudWatch（可选但推荐）
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        # 仅当配置了 GitHub Token Secret 时才附加此 policy
        - !If
          - HasGitHubToken
          - PolicyName: SecretsManagerReadGitHubToken
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}*"
          - !Ref AWS::NoValue

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # ── 数据 EBS 卷（Excel + 收据图片持久化）────────────────
  # 与 EC2 实例分离，实例终止后数据不丢失
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain   # Stack 删除时保留数据卷，防止数据丢失
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-data"

  # ── EC2 实例 ──────────────────────────────────────────────
  Instance:
    Type: AWS::EC2::Instance
    DependsOn: VpcGatewayAttachment
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]

      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30        # 根卷 30GB：系统 + Docker 镜像 + EasyOCR 模型
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-bot"
      # ── User Data：实例首次启动时自动执行 ─────────────────
      # 执行顺序：挂载数据卷 → 安装 Docker → 克隆代码 → 注册 systemd 服务
      # 日志位置：/var/log/user-data.log（SSH 或 SSM 登录后可查看）
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euo pipefail
            exec > >(tee /var/log/user-data.log | logger -t user-data) 2>&1

            echo "=== [1/6] 系统更新 ==="
            dnf update -y

            echo "=== [2/6] 挂载数据 EBS 卷到 /data ==="
            # 等待设备就绪（EBS attach 需要几秒）
            DATA_DEVICE=/dev/xvdf
            for i in {1..12}; do
              if [ -b "$DATA_DEVICE" ]; then break; fi
              echo "等待 EBS 卷就绪... ($i/12)"
              sleep 5
            done

            # 首次使用时格式化，已有文件系统则跳过
            if ! blkid "$DATA_DEVICE" | grep -q ext4; then
              echo "初始化 ext4 文件系统..."
              mkfs -t ext4 "$DATA_DEVICE"
            fi

            mkdir -p /data
            mount "$DATA_DEVICE" /data
            # 写入 fstab 确保重启后自动挂载
            if ! grep -q "$DATA_DEVICE" /etc/fstab; then
              echo "$DATA_DEVICE /data ext4 defaults,nofail 0 2" >> /etc/fstab
            fi

            # 创建项目所需目录
            mkdir -p /data/excel /data/uploads
            echo "数据卷挂载完成：$(df -h /data | tail -1)"

            echo "=== [3/6] 安装 Docker ==="
            dnf install -y docker git
            systemctl enable docker
            systemctl start docker

            # 安装 docker compose 插件（V2）
            COMPOSE_VERSION=v2.27.0
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -fsSL \
              "https://github.com/docker/compose/releases/download/${!COMPOSE_VERSION}/docker-compose-linux-x86_64" \
              -o /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            echo "=== [4/6] 克隆项目代码 ==="
            APP_DIR=/opt/automation-ocr

            # 私有仓库：从 Secrets Manager 获取 GitHub Token
            SECRET_NAME="${GitHubTokenSecretName}"
            if [ -n "$SECRET_NAME" ]; then
              echo "从 Secrets Manager 获取 GitHub Token..."
              TOKEN=$(aws secretsmanager get-secret-value \
                --secret-id "$SECRET_NAME" --region ${AWS::Region} \
                --query SecretString --output text)
              REPO_URL=$(echo "${GitRepoUrl}" | sed "s|https://|https://$TOKEN@|")
            else
              REPO_URL="${GitRepoUrl}"
            fi

            git clone --depth 1 --branch ${GitBranch} "$REPO_URL" "$APP_DIR"
            # 安全清理：立即清除内存中的 token 变量
            unset TOKEN REPO_URL SECRET_NAME

            # 将数据目录软链到项目 data/（docker-compose volume bind mount 路径）
            rm -rf "$APP_DIR/data"
            ln -s /data "$APP_DIR/data"

            # 创建日志目录
            mkdir -p "$APP_DIR/logs"

            # WhatsApp 登录凭证目录（首次启动后扫码，凭证持久化在数据卷）
            mkdir -p /data/wwebjs_auth
            ln -sf /data/wwebjs_auth "$APP_DIR/wa-bot/.wwebjs_auth"

            echo "=== [5/6] 预构建镜像（避免首次启动超时）==="
            cd "$APP_DIR"
            docker compose build

            echo "=== [6/6] 注册 systemd 服务（开机自启）==="
            cat > /etc/systemd/system/automation-ocr.service << 'EOF'
            [Unit]
            Description=WhatsApp OCR Bot (docker compose)
            Requires=docker.service
            After=docker.service network-online.target
            Wants=network-online.target

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            WorkingDirectory=/opt/automation-ocr
            # 启动：后台运行所有服务
            ExecStart=/usr/bin/docker compose up -d --remove-orphans
            # 停止：优雅停止容器（给 wa-bot 60s 完成断线流程）
            ExecStop=/usr/bin/docker compose down --timeout 60
            # 重启策略：失败后等 30s 再试
            Restart=on-failure
            RestartSec=30s

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable automation-ocr.service
            systemctl start automation-ocr.service

            echo "=== 部署完成 ==="
            echo "提示：首次启动需要扫描 WhatsApp QR 码。"
            echo "通过 SSM Session Manager 连接实例后执行："
            echo "  sudo docker logs -f wa-bot"

  # ── 将数据卷挂载到实例 ─────────────────────────────────────
  DataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref Instance
      VolumeId: !Ref DataVolume
      Device: /dev/xvdf

# ────────────────────────────────────────────────────────────
# 输出：部署完成后在 Console 可见
# ────────────────────────────────────────────────────────────
Outputs:
  InstanceId:
    Description: "EC2 实例 ID（用于 SSM 登录：aws ssm start-session --target <此值>）"
    Value: !Ref Instance

  PublicIp:
    Description: "EC2 公网 IP（仅供参考，Bot 不对外暴露端口）"
    Value: !GetAtt Instance.PublicIp

  DataVolumeId:
    Description: "数据 EBS 卷 ID（Stack 删除后数据卷仍保留）"
    Value: !Ref DataVolume

  SsmLoginCommand:
    Description: "通过 SSM 免密登录实例的命令"
    Value: !Sub "aws ssm start-session --target ${Instance} --region ${AWS::Region}"
